<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E2E mock watch lv888888888</title>
    <style>

      .body[role='rowgroup'] {

    <div class="ga-ns-comment-panel comment-panel">
      <div
        class="comment-data-grid data-grid"
